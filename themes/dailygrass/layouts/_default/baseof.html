<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "en-us" }}" dir="auto" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Description | default site.Params.description }}">
  <meta name="author" content="{{ site.Params.author }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="alternate" type="application/rss+xml" href="{{ "/index.xml" | absURL }}" title="RSS">
  <link rel="icon" href="{{ "/favicon.ico" | absURL }}">
  <style>
    :root { --bg:#fff; --bg-alt:#f8f9fa; --text:#1a1a2e; --text-light:#6c757d; --border:#dee2e6; --accent:#1a73e8; --tag-bg:#e8f0fe; --card-bg:#fff }
    [data-theme="dark"] { --bg:#1a1a2e; --bg-alt:#16213e; --text:#e0e0e0; --text-light:#a0a0b0; --border:#2a2a4a; --accent:#4dabf7; --tag-bg:#252550; --card-bg:#16213e }
    * { box-sizing:border-box; margin:0; padding:0 }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; transition:background .3s,color .3s }
    .container { max-width:800px; margin:0 auto; padding:0 20px }
    header { border-bottom:1px solid var(--border); padding:16px 0; margin-bottom:32px }
    .header-inner { max-width:800px; margin:0 auto; padding:0 20px; display:flex; align-items:center; justify-content:space-between }
    .site-title { font-size:1.5rem; font-weight:700; text-decoration:none; color:var(--text) }
    nav { display:flex; align-items:center; gap:16px }
    nav a { text-decoration:none; color:var(--text-light); font-size:.9rem; }
    nav a:hover { color:var(--accent) }
    .theme-toggle { background:none; border:1px solid var(--border); border-radius:6px; padding:4px 10px; cursor:pointer; color:var(--text); font-size:1rem }
    .hero { text-align:center; padding:40px 0; margin-bottom:32px }
    .hero h1 { font-size:2.2rem; margin-bottom:12px }
    .hero p { color:var(--text-light); font-size:1.1rem; max-width:600px; margin:0 auto }
    .article-card { background:var(--card-bg); border:1px solid var(--border); border-radius:8px; padding:24px; margin-bottom:16px; transition:border-color .2s }
    .article-card:hover { border-color:var(--accent) }
    .article-card h2 { font-size:1.3rem; margin-bottom:8px }
    .article-card h2 a { text-decoration:none; color:var(--text) }
    .article-card h2 a:hover { color:var(--accent) }
    .article-meta { font-size:.85rem; color:var(--text-light); margin-bottom:10px }
    .article-meta span { margin-right:12px }
    .article-summary { color:var(--text-light); font-size:.95rem }
    .tags { margin-top:10px }
    .tag { display:inline-block; background:var(--tag-bg); color:var(--accent); padding:2px 10px; border-radius:12px; font-size:.8rem; margin-right:6px; text-decoration:none }
    .single-article { max-width:800px; margin:0 auto; padding:0 20px 40px }
    .single-article h1 { font-size:1.8rem; margin-bottom:12px }
    .single-article .content { font-size:1.05rem }
    .single-article .content p { margin-bottom:1.2rem }
    .page-header { margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border) }
    .page-header h1 { font-size:1.8rem }
    .breadcrumbs { font-size:.85rem; color:var(--text-light); margin-bottom:8px }
    .breadcrumbs a { color:var(--accent); text-decoration:none }
    .footer { text-align:center; padding:32px 0; border-top:1px solid var(--border); color:var(--text-light); font-size:.85rem }
    .footer a { color:var(--accent); text-decoration:none }
  </style>
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.setAttribute('data-theme','dark')}})()</script>
</head>
<body>
<header><div class="header-inner"><a href="{{ "/" | absURL }}" class="site-title">{{ site.Title }}</a>
<nav>
<a href="{{ "/categories/" | absURL }}">Categories</a>
<a href="{{ "/tags/" | absURL }}">Tags</a>
<a href="{{ "/search/" | absURL }}">Search</a>
<a href="{{ "/index.xml" | absURL }}">RSS</a>
<button class="theme-toggle" onclick="toggleTheme()">☀/🌙</button>
</nav></div></header>
<main class="container">{{ block "main" . }}{{ end }}</main>
<footer class="footer"><span>&copy; 2026 <a href="{{ "/" | absURL }}">{{ site.Title }}</a></span></footer>
<script>function toggleTheme(){var h=document.documentElement;var c=h.getAttribute('data-theme');var n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('theme',n)}</script>
</body></html>
