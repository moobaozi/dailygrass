<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <!-- Body -->
  <ellipse cx="256" cy="310" rx="120" ry="90" fill="#f5f5f0"/>
  <!-- Head -->
  <ellipse cx="256" cy="220" rx="82" ry="68" fill="#f5f5f0"/>
  <!-- Head spot -->
  <ellipse cx="230" cy="205" rx="22" ry="18" fill="#2d2d2d" opacity="0.7"/>
  <!-- Ears -->
  <ellipse cx="175" cy="178" rx="26" ry="16" fill="#f5f5f0" transform="rotate(-20,175,178)"/>
  <ellipse cx="175" cy="178" rx="15" ry="9" fill="#fca5a5" transform="rotate(-20,175,178)"/>
  <ellipse cx="337" cy="178" rx="26" ry="16" fill="#f5f5f0" transform="rotate(20,337,178)"/>
  <ellipse cx="337" cy="178" rx="15" ry="9" fill="#fca5a5" transform="rotate(20,337,178)"/>
  <!-- Horns -->
  <ellipse cx="198" cy="154" rx="8" ry="18" fill="#8B7355" transform="rotate(-25,198,154)"/>
  <ellipse cx="314" cy="154" rx="8" ry="18" fill="#8B7355" transform="rotate(25,314,154)"/>
  <!-- Eyes -->
  <ellipse cx="228" cy="215" rx="13" ry="15" fill="white"/>
  <circle cx="230" cy="215" r="8" fill="#333"/>
  <circle cx="233" cy="212" r="3" fill="white"/>
  <ellipse cx="284" cy="215" rx="13" ry="15" fill="white"/>
  <circle cx="286" cy="215" r="8" fill="#333"/>
  <circle cx="289" cy="212" r="3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="256" cy="242" rx="17" ry="11" fill="#fca5a5"/>
  <circle cx="250" cy="242" r="2.5" fill="#333"/>
  <circle cx="262" cy="242" r="2.5" fill="#333"/>
  <!-- Smile -->
  <path d="M 243 253 Q 256 264 269 253" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Grass in mouth -->
  <path d="M 256 258 L 242 305" stroke="#4ade80" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 256 258 L 256 312" stroke="#4ade80" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 256 258 L 270 300" stroke="#4ade80" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 270 285 Q 278 278 274 290" fill="#4ade80"/>
  <!-- Newspaper -->
  <g transform="rotate(-6,350,250)">
    <rect x="335" y="215" width="132" height="170" rx="5" fill="#f5e6c8" filter="drop-shadow(2px 2px 4px rgba(0,0,0,0.3))"/>
    <!-- Fold line -->
    <line x1="401" y1="215" x2="401" y2="385" stroke="#c4a86c" stroke-width="1" opacity="0.5"/>
    <!-- Header -->
    <rect x="345" y="225" width="112" height="20" rx="2" fill="#333"/>
    <rect x="350" y="230" width="92" height="3" rx="1.5" fill="#e8d5a3"/>
    <rect x="350" y="237" width="72" height="3" rx="1.5" fill="#e8d5a3"/>
    <!-- Headline -->
    <rect x="345" y="253" width="112" height="16" rx="2" fill="#555"/>
    <!-- Left column text -->
    <rect x="345" y="277" width="50" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <rect x="345" y="284" width="50" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <rect x="345" y="291" width="35" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <rect x="345" y="300" width="50" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <rect x="345" y="307" width="50" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <rect x="345" y="314" width="42" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <!-- Right column text -->
    <rect x="408" y="277" width="50" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <rect x="408" y="284" width="50" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <rect x="408" y="291" width="35" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <rect x="408" y="300" width="50" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <rect x="408" y="307" width="50" height="3" rx="1.5" fill="#888" opacity="0.6"/>
    <!-- Image placeholder -->
    <rect x="345" y="325" width="112" height="38" rx="2" fill="#aaa" opacity="0.25"/>
    <!-- Bottom bar -->
    <rect x="345" y="372" width="112" height="3" rx="1.5" fill="#888" opacity="0.4"/>
  </g>
  <!-- Tail -->
  <path d="M 145 300 Q 110 280 100 252" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="97" cy="246" rx="6" ry="5" fill="#333"/>
</svg>
